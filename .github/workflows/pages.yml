name: Quality and GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test, build, E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Root-base and AdSense mock end-to-end tests
        run: npm run test:e2e:root

      - name: Resolve host-agnostic deployment profile
        env:
          SITE_URL_OVERRIDE: ${{ vars.SITE_URL }}
          CUSTOM_DOMAIN_VALUE: ${{ vars.CUSTOM_DOMAIN }}
          PUBLIC_CONTACT_EMAIL_VALUE: ${{ vars.PUBLIC_CONTACT_EMAIL }}
          ADSENSE_ACCOUNT_META_ENABLED_VALUE: ${{ vars.ADSENSE_ACCOUNT_META_ENABLED || 'false' }}
          ADSENSE_ADS_ENABLED_VALUE: ${{ vars.ADSENSE_ADS_ENABLED || vars.ADSENSE_ENABLED || 'false' }}
          ADSENSE_LEGACY_ENABLED_VALUE: ${{ vars.ADSENSE_ENABLED }}
          ADSENSE_CLIENT_ID_VALUE: ${{ vars.ADSENSE_CLIENT_ID }}
          ADSENSE_PUBLISHER_ID_VALUE: ${{ vars.ADSENSE_PUBLISHER_ID }}
          ADSENSE_CONTENT_SLOT_ID_VALUE: ${{ vars.ADSENSE_CONTENT_SLOT_ID }}
          SITE_OPERATOR_NAME_VALUE: ${{ vars.SITE_OPERATOR_NAME }}
          PUBLIC_CMP_PROVIDER_NAME_VALUE: ${{ vars.PUBLIC_CMP_PROVIDER_NAME }}
          PUBLIC_CMP_SETTINGS_URL_VALUE: ${{ vars.PUBLIC_CMP_SETTINGS_URL }}
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ -n "${CUSTOM_DOMAIN_VALUE}" ]]; then
            resolved_base="/"
            resolved_site_url="${SITE_URL_OVERRIDE:-https://${CUSTOM_DOMAIN_VALUE}/}"
          elif [[ "${repository_name,,}" == "${owner_lower}.github.io" ]]; then
            resolved_base="/"
            resolved_site_url="${SITE_URL_OVERRIDE:-https://${owner_lower}.github.io/}"
          else
            resolved_base="/${repository_name}/"
            resolved_site_url="${SITE_URL_OVERRIDE:-https://${owner_lower}.github.io/${repository_name}/}"
          fi
          echo "PAGES_BASE_PATH=${resolved_base}" >> "$GITHUB_ENV"
          echo "SITE_URL=${resolved_site_url}" >> "$GITHUB_ENV"
          echo "CUSTOM_DOMAIN=${CUSTOM_DOMAIN_VALUE}" >> "$GITHUB_ENV"
          echo "PUBLIC_CONTACT_EMAIL=${PUBLIC_CONTACT_EMAIL_VALUE}" >> "$GITHUB_ENV"
          echo "ADSENSE_ACCOUNT_META_ENABLED=${ADSENSE_ACCOUNT_META_ENABLED_VALUE}" >> "$GITHUB_ENV"
          echo "ADSENSE_ADS_ENABLED=${ADSENSE_ADS_ENABLED_VALUE}" >> "$GITHUB_ENV"
          echo "ADSENSE_ENABLED=${ADSENSE_LEGACY_ENABLED_VALUE}" >> "$GITHUB_ENV"
          echo "ADSENSE_CLIENT_ID=${ADSENSE_CLIENT_ID_VALUE}" >> "$GITHUB_ENV"
          echo "ADSENSE_PUBLISHER_ID=${ADSENSE_PUBLISHER_ID_VALUE}" >> "$GITHUB_ENV"
          echo "ADSENSE_CONTENT_SLOT_ID=${ADSENSE_CONTENT_SLOT_ID_VALUE}" >> "$GITHUB_ENV"
          echo "SITE_OPERATOR_NAME=${SITE_OPERATOR_NAME_VALUE}" >> "$GITHUB_ENV"
          echo "PUBLIC_CMP_PROVIDER_NAME=${PUBLIC_CMP_PROVIDER_NAME_VALUE}" >> "$GITHUB_ENV"
          echo "PUBLIC_CMP_SETTINGS_URL=${PUBLIC_CMP_SETTINGS_URL_VALUE}" >> "$GITHUB_ENV"

      - name: Configure GitHub Pages
        id: pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Production build
        run: npm run build

      - name: Verify production artifact
        run: npm run verify:dist

      - name: Production Pages end-to-end tests
        run: E2E_BASE_PATH="${PAGES_BASE_PATH}" npm run test:e2e:prod:run

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failures-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  live-smoke:
    name: Smoke test deployed Pages site
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify live GitHub Pages
        run: npm run test:e2e:live
        env:
          E2E_LIVE_URL: ${{ vars.SITE_URL || 'https://moyeoplay.studio/' }}
          E2E_CHECK_REDIRECTS: 'true'
          ADSENSE_ACCOUNT_META_ENABLED: ${{ vars.ADSENSE_ACCOUNT_META_ENABLED || 'false' }}
          ADSENSE_ADS_ENABLED: ${{ vars.ADSENSE_ADS_ENABLED || vars.ADSENSE_ENABLED || 'false' }}
          ADSENSE_CLIENT_ID: ${{ vars.ADSENSE_CLIENT_ID }}
          ADSENSE_PUBLISHER_ID: ${{ vars.ADSENSE_PUBLISHER_ID }}

      - name: Upload live smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: live-smoke-failures-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
